services:
  postgres:
    image: postgres:16-alpine
    container_name: quoteflow_postgres
    environment:
      POSTGRES_DB: quoteflow
      POSTGRES_USER: quoteflow
      POSTGRES_PASSWORD: quoteflow_password
    ports:
      - "5433:5432"
    volumes:
      - quoteflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quoteflow -d quoteflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: quoteflow_redis
    ports:
      - "6380:6379"

volumes:
  quoteflow_postgres_data:
